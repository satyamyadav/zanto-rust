name: release

# Build unsigned desktop installers for macOS, Windows, and Linux and attach
# them to a GitHub Release. Trigger by pushing a version tag (e.g. v1.0.0), or
# run manually for a dry build.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
            rust-targets: ""
          - platform: windows-latest
            args: ""
            rust-targets: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl wget file libssl-dev libgtk-3-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: crates/zanto-desktop/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install frontend dependencies
        working-directory: crates/zanto-desktop
        run: pnpm install --frozen-lockfile

      - name: Build app + create release (unsigned)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: crates/zanto-desktop
          # Draft so you can review artifacts and notes before publishing.
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || 'v0.0.0-dev' }}
          releaseName: "zanto __VERSION__"
          releaseDraft: true
          prerelease: false
          releaseBody: |
            Unsigned builds — installation notes:

            - macOS: right-click the app → Open the first time, or run
              `xattr -dr com.apple.quarantine /Applications/zanto.app`.
            - Windows: SmartScreen → "More info" → "Run anyway".
            - Linux: `chmod +x zanto_*.AppImage` and run, or `sudo dpkg -i` the .deb.

            See the full notes and checksums below.
          args: ${{ matrix.args }}
