name: test
on: [push, pull_request]
jobs:
  rust:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri system deps
        run: |
          sudo add-apt-repository universe -y
          sudo apt-get update -y
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/zanto-desktop
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.15.9 }
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: pnpm, cache-dependency-path: crates/zanto-desktop/pnpm-lock.yaml }
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:ui
